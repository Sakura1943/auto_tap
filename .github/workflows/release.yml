name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.41.9', channel: stable }
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi --target-platform=android-arm64,android-arm,android-x64
      - name: Rename
        run: |
          V=${{ github.event.inputs.version || github.ref_name }}; V=${V#v}
          cd build/app/outputs/flutter-apk
          mv app-armeabi-v7a-release.apk  auto_tap_android_${V}_armeabi-v7a.apk
          mv app-arm64-v8a-release.apk    auto_tap_android_${V}_arm64-v8a.apk
          mv app-x86_64-release.apk       auto_tap_android_${V}_x86_64.apk
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/auto_tap_android_*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/auto_tap_android_*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

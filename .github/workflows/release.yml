name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }

      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.41.9', channel: stable }

      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi --target-platform=android-arm64,android-arm,android-x64

      - name: Get version
        run: |
          V=$(grep '^version:' pubspec.yaml | sed 's/version: *//;s/+.*//')
          echo "VERSION=$V" >> $GITHUB_ENV

      - name: Rename
        run: |
          cd build/app/outputs/flutter-apk
          mv app-armeabi-v7a-release.apk  auto_tap_android_${{ env.VERSION }}_armeabi-v7a.apk
          mv app-arm64-v8a-release.apk    auto_tap_android_${{ env.VERSION }}_arm64-v8a.apk
          mv app-x86_64-release.apk       auto_tap_android_${{ env.VERSION }}_x86_64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/auto_tap_android_*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: build/app/outputs/flutter-apk/auto_tap_android_*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

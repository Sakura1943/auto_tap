name: auto_tap
description: "A configurable auto-clicker app for Android"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
